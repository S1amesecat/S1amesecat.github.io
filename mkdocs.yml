site_name: S1amesecat 知识库
site_description: 记录学习、开发与实践过程中的技术笔记
site_author: S1amesecat
site_url: https://s1amesecat.github.io/
repo_url: https://github.com/S1amesecat/S1amesecat.github.io
repo_name: S1amesecat/S1amesecat.github.io
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 S1amesecat

theme:
  name: material
  language: zh
  icon:
    logo: material/book-open-page-variant
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 跟随系统
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/S1amesecat

nav:
  - 首页: index.md
  - 使用指南:
      - 开始使用: guide/getting-started.md
      - 发布与维护: guide/deployment.md
  - 关于: about.md
